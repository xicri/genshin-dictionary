name: "Deployment"

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event_name != 'release'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      SERVER_ENV: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # `pnpm build` is not required because it runs on `prepare` process

      - name: "[preview] deploy Cloudflare Worker"
        id: preview
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          command: versions upload --message "Branch - ${{ github.ref_name }}"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: "[preview] Add comment for deployment URL"
        run: "gh pr comment ${{ github.event.number }} --edit-last --create-if-none --body 'Deployed to preview:\n${{ steps.preview.outputs.pages-deployment-alias-url && steps.preview.outputs.pages-deployment-alias-url || steps.preview.outputs.deployment-url }}'"
        env:
          GH_TOKEN: ${{ github.token }}

  production:
    if: github.event_name == 'release'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      SERVER_ENV: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # `pnpm build` is not required because it runs on `prepare` process

      - name: "[production] deploy Cloudflare Worker"
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
